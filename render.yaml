# Connect your GitHub repo, then use "New > Blueprint" and select this file.

services:
  - type: web
    name: lumina-crawl
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_ENABLED
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: CRAWL_MAX_PAGES
        value: "30"
      - key: CRAWL_MAX_DEPTH
        value: "4"
