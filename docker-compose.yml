services:
  mysql:
    image: mysql:8.0
    container_name: wqa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quality_analyzer}
      MYSQL_USER: ${MYSQL_USER:-wqa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wqa_secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: wqa-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-quality_analyzer}
      MYSQL_USER: ${MYSQL_USER:-wqa}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wqa_secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-true}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
      CRAWL_MAX_PAGES: ${CRAWL_MAX_PAGES:-50}
      CRAWL_MAX_DEPTH: ${CRAWL_MAX_DEPTH:-5}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
